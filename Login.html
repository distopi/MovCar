<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="Login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <div class="theme">
        <label class="switch">
            <input type="checkbox" onclick="switchTheme()">
            <span class="slider"></span>
        </label>
    </div>
    <div class="login-box">
        <h1>Entrar</h1>
        <form>
            <input type="text" placeholder="E-mail" id="E-mail-imput">
            <input type="password" placeholder="Senha" id="Senha-input">
          <button type="button" id="login-button" onclick="window.location.href='index.html'">
    Entrar
</button>
        </form>
    </div>
</body>
<script src="Login.js"></script>
</html>
